{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wishlist{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'wishlist:index' %}">Wishlist</a>
            <div class="nav-links">
                {% if user.is_authenticated %}
                    <span class="nav-user">{{ user.username }}</span>
                    <a href="{% url 'wishlist:logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'wishlist:login' %}">Login</a>
                    <a href="{% url 'wishlist:register' %}">Register</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Wishlist App</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
