{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wishlist{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="bg-image" role="img" aria-label="Photo by Alexander Popov"></div>
    <div class="bg-overlay"></div>

    <header>
        <nav>
            <a href="{% url 'wishlist:index' %}" class="nav-brand">Wishlist</a>
            <div class="nav-links">
                {% if user.is_authenticated %}
                    <span class="nav-user">{{ user.username }}</span>
                    <a href="{% url 'wishlist:logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'wishlist:login' %}">Login</a>
                    <a href="{% url 'wishlist:register' %}">Register</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Wishlist App</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
