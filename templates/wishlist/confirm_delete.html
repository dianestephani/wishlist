{% extends "base.html" %}

{% block title %}Delete {{ object.title }}{% endblock %}

{% block content %}
<div class="auth-form">
    <h1>Delete {{ type|title }}</h1>
    <p>Are you sure you want to delete <strong>{{ object.title }}</strong>? This action cannot be undone.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-delete-confirm">Yes, Delete</button>
    </form>

    <p class="auth-link"><a href="javascript:history.back()">Cancel</a></p>
</div>
{% endblock %}
