{% extends "base.html" %}

{% block title %}Friends - Wishlist{% endblock %}

{% block content %}
<div class="page-header">
    <a href="{% url 'wishlist:dashboard' %}" class="back-link">&larr; Back to Dashboard</a>
    <h1 class="page-title">Friends</h1>
</div>

<div class="friends-search">
    <form method="get" class="friends-search-form">
        <input type="text" name="q" placeholder="Search by username, email, or phone number" value="{{ request.GET.q|default:'' }}">
        <button type="submit" class="btn-search">Search</button>
    </form>
</div>

<div class="friends-section">
    <h2 class="section-title">My Friends</h2>
    <p class="empty-state">No friends added yet.</p>
</div>
{% endblock %}
